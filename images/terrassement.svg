<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Travaux de terrassement et nettoyage de terrain">
  <defs>
    <linearGradient id="s2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cdeaff"/><stop offset="1" stop-color="#eef8ff"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c19a5b"/><stop offset="1" stop-color="#8f6e3b"/></linearGradient>
  </defs>
  <rect width="600" height="270" fill="url(#s2)"/>
  <rect y="250" width="600" height="150" fill="url(#g2)"/>
  <!-- terraced earth -->
  <path d="M0 260 H260 V300 H0 Z" fill="#a87f44"/>
  <path d="M260 300 H520 V340 H260 Z" fill="#9a7239"/>
  <!-- truck (camion benne) -->
  <g transform="translate(330,150)">
    <rect x="0" y="40" width="120" height="60" rx="8" fill="#2f7d3f"/>
    <rect x="120" y="55" width="55" height="45" rx="8" fill="#3a9650"/>
    <rect x="130" y="62" width="35" height="24" rx="4" fill="#bfeaff" stroke="#15391f" stroke-width="2"/>
    <circle cx="40" cy="108" r="18" fill="#23282e"/>
    <circle cx="150" cy="108" r="18" fill="#23282e"/>
    <circle cx="40" cy="108" r="7" fill="#5a626c"/>
    <circle cx="150" cy="108" r="7" fill="#5a626c"/>
    <path d="M5 40 L40 18 L115 18 L115 40 Z" fill="#1f5e2c"/>
  </g>
  <!-- earth pile -->
  <path d="M40 250 Q120 180 210 250 Z" fill="#7d5d31"/>
  <ellipse cx="120" cy="252" rx="95" ry="14" fill="#6d4f29"/>
  <!-- rocks (enrochement) -->
  <g fill="#7c7f86">
    <path d="M470 260 l40 -22 l44 18 l-8 30 l-70 4 Z"/>
    <path d="M520 290 l40 -16 l30 20 l-10 24 l-58 0 Z" fill="#8d9098"/>
  </g>
</svg>
